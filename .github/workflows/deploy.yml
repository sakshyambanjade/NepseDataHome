name: Deploy NepSense Dashboard

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 11 * * *' # 11:00 UTC (4:45 PM NPT) daily after NEPSE close
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pandas numpy typer rich scikit-learn

      - name: Run NepSense Pipeline
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          nepsense daily-run
        env:
          # Add any necessary env vars for collectors if needed
          CI: true

      - name: Prepare Frontend Data
        run: |
          mkdir -p web/public/data
          cp -r data/dashboard/* web/public/data/

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Node Dependencies
        working-directory: web
        run: npm install

      - name: Build Vite App
        working-directory: web
        run: npm run build
        env:
          VITE_BASE_PATH: ${{ github.event.repository.name }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'web/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
